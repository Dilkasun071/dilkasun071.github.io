<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WarWatch — Live Updates</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #d93025;
    --dark: #121212;
    --card: #1e1e1e;
    --border: #2c2c2c;
    --text: #f0f0f0;
    --muted: #888;
    --tag-bg: rgba(217,48,37,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: #0d0d0d;
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.65rem;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.45rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .logo em { color: var(--red); font-style: normal; }

  .live-pill {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(217,48,37,0.12);
    border: 1px solid rgba(217,48,37,0.3);
    border-radius: 20px;
    padding: 0.25rem 0.65rem;
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--red);
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1.4s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }

  .regions {
    display: flex;
    gap: 0.4rem;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .regions::-webkit-scrollbar { display: none; }

  .region-btn {
    flex-shrink: 0;
    padding: 0.28rem 0.72rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Barlow', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .region-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
    font-weight: 600;
  }

  /* REFRESH BAR */
  .refresh-bar {
    background: #181818;
    border-bottom: 1px solid var(--border);
    padding: 0.45rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .refresh-info { font-size: 0.7rem; color: var(--muted); }
  .refresh-info span { color: #4caf50; font-weight: 600; }

  .progress-wrap {
    width: 90px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--red);
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
  }

  /* FEED */
  .feed {
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    animation: slideUp 0.35s ease both;
  }

  @keyframes slideUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card-image-wrap { position: relative; }

  .card-image {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #2a2a2a;
  }

  .card-image-fallback {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #222, #2e2e2e);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  .source-badge {
    position: absolute;
    bottom: 0.6rem;
    left: 0.6rem;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(4px);
    border-radius: 6px;
    padding: 0.18rem 0.5rem;
    font-size: 0.65rem;
    font-weight: 600;
    color: #ddd;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .time-badge {
    position: absolute;
    bottom: 0.6rem;
    right: 0.6rem;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(4px);
    border-radius: 6px;
    padding: 0.18rem 0.5rem;
    font-size: 0.65rem;
    color: #aaa;
  }

  .card-body { padding: 0.85rem 1rem 1rem; }

  .tag-region {
    display: inline-block;
    background: var(--tag-bg);
    color: #ff6b5b;
    border-radius: 5px;
    padding: 0.18rem 0.52rem;
    font-size: 0.63rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.5rem;
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.12rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 0.55rem;
    letter-spacing: 0.01em;
  }

  .card.featured .card-title { font-size: 1.3rem; }

  .card-desc {
    font-size: 0.83rem;
    line-height: 1.65;
    color: #adadad;
    font-weight: 400;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.8rem;
    font-size: 0.76rem;
    font-weight: 600;
    color: var(--red);
    text-decoration: none;
  }

  /* SKELETON */
  .skeleton {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .skel { background: linear-gradient(90deg,#1e1e1e 25%,#2b2b2b 50%,#1e1e1e 75%); background-size:200% 100%; animation: shimmer 1.4s infinite; }
  .skel-img { width:100%; aspect-ratio:16/9; }
  .skel-body { padding:0.85rem 1rem 1rem; display:flex; flex-direction:column; gap:0.5rem; }
  .skel-line { height:11px; border-radius:4px; }

  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* STATES */
  .msg-state {
    text-align: center;
    padding: 3.5rem 1.5rem;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.8;
  }

  .msg-state .icon { font-size: 2.8rem; display:block; margin-bottom:0.75rem; }

  footer {
    text-align: center;
    padding: 1.5rem 1rem 2.5rem;
    font-size: 0.67rem;
    color: #3a3a3a;
    line-height: 1.7;
    border-top: 1px solid var(--border);
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">War<em>Watch</em></div>
    <div class="live-pill"><div class="live-dot"></div> Live</div>
  </div>
  <div class="regions" id="regions">
    <button class="region-btn active" data-query="Ukraine Russia war news today 2026" data-label="Ukraine">🇺🇦 Ukraine</button>
    <button class="region-btn" data-query="Gaza conflict latest news 2026" data-label="Gaza">🇵🇸 Gaza</button>
    <button class="region-btn" data-query="Sudan civil war news today 2026" data-label="Sudan">🇸🇩 Sudan</button>
    <button class="region-btn" data-query="Syria war news today 2026" data-label="Syria">🇸🇾 Syria</button>
    <button class="region-btn" data-query="Myanmar conflict news 2026" data-label="Myanmar">🇲🇲 Myanmar</button>
    <button class="region-btn" data-query="Yemen war Houthi news 2026" data-label="Yemen">🇾🇪 Yemen</button>
    <button class="region-btn" data-query="global conflict breaking war news today 2026" data-label="World">🌍 World</button>
  </div>
</header>

<div class="refresh-bar">
  <div class="refresh-info">Refreshes in <span id="countdown">5:00</span></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<div class="feed" id="feed"></div>

<footer>
  WarWatch • Powered by Claude AI + Real-time Web Search<br>
  Auto-refreshes every 5 minutes • Verify news at original source
</footer>

<script>
  const REFRESH_SECS = 300;
  let currentQuery = 'Ukraine Russia war news today 2026';
  let timer = REFRESH_SECS;
  let countdownInterval = null;
  let progressInterval = null;
  let progressElapsed = 0;

  // Region switching
  document.getElementById('regions').addEventListener('click', e => {
    const btn = e.target.closest('.region-btn');
    if (!btn) return;
    document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentQuery = btn.dataset.query;
    resetTimers();
    loadNews();
  });

  function resetTimers() {
    timer = REFRESH_SECS;
    progressElapsed = 0;
    clearInterval(countdownInterval);
    clearInterval(progressInterval);
    document.getElementById('progressBar').style.width = '0%';
    startTimers();
  }

  function startTimers() {
    countdownInterval = setInterval(() => {
      timer--;
      const m = Math.floor(timer / 60);
      const s = String(timer % 60).padStart(2, '0');
      document.getElementById('countdown').textContent = `${m}:${s}`;
      if (timer <= 0) {
        timer = REFRESH_SECS;
        loadNews();
      }
    }, 1000);

    progressInterval = setInterval(() => {
      progressElapsed++;
      const pct = (progressElapsed / REFRESH_SECS) * 100;
      document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
      if (progressElapsed >= REFRESH_SECS) progressElapsed = 0;
    }, 1000);
  }

  function showSkeletons() {
    document.getElementById('feed').innerHTML = [1,2,3,4].map(() => `
      <div class="skeleton">
        <div class="skel skel-img"></div>
        <div class="skel-body">
          <div class="skel skel-line" style="width:38%"></div>
          <div class="skel skel-line" style="width:92%; height:15px; margin-top:2px"></div>
          <div class="skel skel-line" style="width:75%; height:15px"></div>
          <div class="skel skel-line" style="width:85%; margin-top:4px"></div>
          <div class="skel skel-line" style="width:70%"></div>
          <div class="skel skel-line" style="width:60%"></div>
        </div>
      </div>`).join('');
  }

  async function loadNews() {
    showSkeletons();

    const system = `You are a war and conflict news aggregator. Use web search to find the LATEST REAL news about the given topic from credible outlets (Reuters, BBC, AP, Al Jazeera, Guardian, CNN).

Return ONLY a raw JSON array — no markdown fences, no explanation, nothing else.

Each object must have:
- "title": punchy headline, max 12 words
- "description": 3-4 sentences. Be SPECIFIC: name locations, people, numbers, dates. Explain what happened and why it matters.
- "region": exact place e.g. "Zaporizhzhia, Ukraine"
- "source": outlet name e.g. "Reuters"
- "url": real article URL if found, else "#"
- "time": how recent e.g. "1 hour ago", "3 hours ago", "Today"
- "image_search": 4-6 word photo keyword string for this story e.g. "Ukraine frontline shelling soldiers"
- "featured": true for the single most important story only, false for all others

Return exactly 5 items. Only real verified news. Do not fabricate anything.`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: `Get the latest real news: ${currentQuery}` }]
        })
      });

      const data = await res.json();
      let raw = '';
      for (const block of data.content) {
        if (block.type === 'text') raw += block.text;
      }

      const clean = raw.replace(/```json[\s\S]*?```|```/g, '').trim();
      const start = clean.indexOf('[');
      const end = clean.lastIndexOf(']');
      const jsonStr = clean.substring(start, end + 1);
      const articles = JSON.parse(jsonStr);
      renderCards(articles);
    } catch (err) {
      document.getElementById('feed').innerHTML = `
        <div class="msg-state">
          <span class="icon">⚠️</span>
          Could not load news.<br>Check your connection or try a different region.
        </div>`;
    }
  }

  function getPhoto(keywords, index) {
    // Unsplash source API — real photographic images based on keywords, no auth needed
    return `https://source.unsplash.com/800x450/?${encodeURIComponent(keywords)}&sig=${index}${Date.now()}`;
  }

  function renderCards(articles) {
    if (!articles || !articles.length) {
      document.getElementById('feed').innerHTML = `<div class="msg-state"><span class="icon">📭</span>No stories found.</div>`;
      return;
    }

    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    const sorted = [...articles].sort((a,b) => (b.featured?1:0)-(a.featured?1:0));

    sorted.forEach((a, i) => {
      const card = document.createElement('div');
      card.className = 'card' + (a.featured ? ' featured' : '');
      card.style.animationDelay = `${i * 0.08}s`;

      const photoUrl = getPhoto(a.image_search || 'war conflict military', i);
      const linkHtml = a.url && a.url !== '#'
        ? `<a class="card-link" href="${a.url}" target="_blank" rel="noopener">Read full story →</a>`
        : '';

      card.innerHTML = `
        <div class="card-image-wrap">
          <img class="card-image" src="${photoUrl}" alt="${a.title}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-image-fallback">🌍</div>
          <span class="source-badge">${a.source || 'News'}</span>
          <span class="time-badge">${a.time || 'Recent'}</span>
        </div>
        <div class="card-body">
          <span class="tag-region">${a.region || ''}</span>
          <div class="card-title">${a.title}</div>
          <div class="card-desc">${a.description}</div>
          ${linkHtml}
        </div>`;

      feed.appendChild(card);
    });
  }

  // Boot
  loadNews();
  startTimers();
</script>
</body>
</html>
