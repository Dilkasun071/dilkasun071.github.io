<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WarWatch — Live Updates</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #d93025;
    --dark: #111;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #777;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: #0a0a0a;
    border-bottom: 1px solid var(--border);
    padding: 0.8rem 1rem 0.65rem;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.7rem;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .logo em { color: var(--red); font-style: normal; }

  .live-pill {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(217,48,37,0.12);
    border: 1px solid rgba(217,48,37,0.35);
    border-radius: 20px;
    padding: 0.25rem 0.65rem;
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--red);
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* TAB BUTTONS */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.45rem;
  }

  .tab-btn {
    padding: 0.55rem 0.5rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #1a1a1a;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .tab-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  /* REFRESH BAR */
  .refresh-bar {
    background: #161616;
    border-bottom: 1px solid var(--border);
    padding: 0.45rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .refresh-info { font-size: 0.7rem; color: var(--muted); }
  .refresh-info b { color: #5cb85c; }

  .progress-wrap {
    width: 100px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--red);
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
  }

  /* FEED */
  .feed {
    padding: 0.85rem 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    animation: up 0.3s ease both;
  }
  @keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

  .card-img-wrap { position: relative; }

  .card-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #222;
  }

  .card-img-fallback {
    width: 100%;
    aspect-ratio: 16/9;
    background: #222;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  .img-source {
    position: absolute;
    bottom: 0.55rem;
    left: 0.55rem;
    background: rgba(0,0,0,0.75);
    border-radius: 5px;
    padding: 0.16rem 0.48rem;
    font-size: 0.63rem;
    font-weight: 700;
    color: #ddd;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    backdrop-filter: blur(4px);
  }

  .img-time {
    position: absolute;
    bottom: 0.55rem;
    right: 0.55rem;
    background: rgba(0,0,0,0.75);
    border-radius: 5px;
    padding: 0.16rem 0.48rem;
    font-size: 0.63rem;
    color: #bbb;
    backdrop-filter: blur(4px);
  }

  .card-body { padding: 0.9rem 1rem 1rem; }

  .region-tag {
    display: inline-block;
    background: rgba(217,48,37,0.15);
    color: #ff6b5b;
    border-radius: 5px;
    padding: 0.17rem 0.5rem;
    font-size: 0.63rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.5rem;
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 0.55rem;
  }

  .card.featured .card-title { font-size: 1.3rem; }

  .card-desc {
    font-size: 0.83rem;
    line-height: 1.68;
    color: #aaa;
  }

  .read-link {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.8rem;
    font-size: 0.76rem;
    font-weight: 600;
    color: var(--red);
    text-decoration: none;
  }

  /* SKELETON */
  .skel-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
  .skel { background: linear-gradient(90deg,#1c1c1c 25%,#282828 50%,#1c1c1c 75%); background-size:200% 100%; animation:shine 1.4s infinite; }
  .skel-img { width:100%; aspect-ratio:16/9; }
  .skel-body { padding:0.9rem 1rem 1rem; display:flex; flex-direction:column; gap:0.5rem; }
  .skel-line { height:11px; border-radius:4px; }
  @keyframes shine { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .error-state {
    text-align:center;
    padding:3rem 1.5rem;
    color:var(--muted);
    font-size:0.85rem;
    line-height:1.8;
  }
  .error-state .ico { font-size:2.5rem; display:block; margin-bottom:0.75rem; }

  footer {
    text-align:center;
    padding:1.5rem 1rem 3rem;
    font-size:0.66rem;
    color:#333;
    line-height:1.8;
    border-top:1px solid var(--border);
    margin-top:0.5rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">War<em>Watch</em></div>
    <div class="live-pill"><div class="live-dot"></div> Live</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-iran" onclick="switchTab('iran')">🇮🇷🇮🇱🇺🇸 Iran · Israel · US</button>
    <button class="tab-btn" id="tab-ukraine" onclick="switchTab('ukraine')">🇺🇦🇷🇺 Ukraine · Russia</button>
  </div>
</header>

<div class="refresh-bar">
  <div class="refresh-info">Refreshes in <b id="countdown">5:00</b></div>
  <div class="progress-wrap"><div class="progress-bar" id="bar"></div></div>
</div>

<div class="feed" id="feed"></div>

<footer>
  WarWatch · Powered by Claude AI + Live Web Search<br>
  Auto-refreshes every 5 min · Always verify at original source
</footer>

<script>
  const TOPICS = {
    iran: {
      query: `Iran Israel United States war conflict military strike news March 2026`,
      label: 'Iran · Israel · US',
      emoji: '🌍'
    },
    ukraine: {
      query: `Ukraine Russia war frontline news March 2026`,
      label: 'Ukraine · Russia',
      emoji: '🇺🇦'
    }
  };

  let activeTopic = 'iran';
  let timerSecs = 300;
  let elapsed = 0;
  let countdownTick = null;
  let progressTick = null;

  function switchTab(topic) {
    activeTopic = topic;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + topic).classList.add('active');
    resetTimers();
    loadNews();
  }

  function resetTimers() {
    clearInterval(countdownTick);
    clearInterval(progressTick);
    timerSecs = 300;
    elapsed = 0;
    document.getElementById('bar').style.width = '0%';
    startTimers();
  }

  function startTimers() {
    updateCountdown();
    countdownTick = setInterval(() => {
      timerSecs--;
      updateCountdown();
      if (timerSecs <= 0) {
        timerSecs = 300;
        elapsed = 0;
        loadNews();
      }
    }, 1000);

    progressTick = setInterval(() => {
      elapsed++;
      document.getElementById('bar').style.width = Math.min((elapsed / 300) * 100, 100) + '%';
      if (elapsed >= 300) elapsed = 0;
    }, 1000);
  }

  function updateCountdown() {
    const m = Math.floor(timerSecs / 60);
    const s = String(timerSecs % 60).padStart(2, '0');
    document.getElementById('countdown').textContent = m + ':' + s;
  }

  function showSkeletons() {
    document.getElementById('feed').innerHTML = [0,1,2,3].map(() => `
      <div class="skel-card">
        <div class="skel skel-img"></div>
        <div class="skel-body">
          <div class="skel skel-line" style="width:36%"></div>
          <div class="skel skel-line" style="width:88%;height:15px;margin-top:3px"></div>
          <div class="skel skel-line" style="width:72%;height:15px"></div>
          <div class="skel skel-line" style="width:95%;margin-top:4px"></div>
          <div class="skel skel-line" style="width:80%"></div>
          <div class="skel skel-line" style="width:65%"></div>
        </div>
      </div>`).join('');
  }

  async function loadNews() {
    showSkeletons();
    const topic = TOPICS[activeTopic];

    const systemPrompt = `You are a real-time war news aggregator. Use web_search to find the LATEST news published TODAY or in the last 48 hours about the given conflict.

IMPORTANT: Search multiple times if needed to find fresh, specific, real stories.

Return ONLY a raw JSON array — absolutely no markdown, no code fences, no explanation text before or after.

Each object in the array must have these exact keys:
- "title": punchy headline max 10 words
- "description": 3 to 4 sentences. Be very specific — include real locations, real people names if mentioned, numbers, dates, what happened and why it matters. No vague summaries.
- "region": exact place e.g. "Tel Aviv, Israel" or "Kharkiv, Ukraine"
- "source": news outlet e.g. "Reuters" or "BBC"
- "url": direct article URL string, or "#" if not found
- "time": how recent e.g. "1 hour ago" or "Today" or "Yesterday"
- "photo_keywords": 4-5 word photo search string for this story e.g. "Iran missile strike Israel 2026"
- "featured": boolean true for the single most important story, false for rest

Return exactly 5 objects. Use ONLY real verified news from Reuters, BBC, AP, Al Jazeera, CNN, Guardian. Never fabricate.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{
            role: 'user',
            content: `Search the web right now and find the latest real news stories about: ${topic.query}. Find at least 5 specific recent stories with details.`
          }]
        })
      });

      const data = await res.json();

      if (data.error) throw new Error(data.error.message);

      // Extract text blocks — the final text block after tool use contains the JSON
      const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text);
      const combined = textBlocks.join('');

      // Extract JSON array robustly
      const start = combined.indexOf('[');
      const end = combined.lastIndexOf(']');
      if (start === -1 || end === -1) throw new Error('No JSON array found');

      const articles = JSON.parse(combined.slice(start, end + 1));
      renderCards(articles);

    } catch (err) {
      console.error(err);
      document.getElementById('feed').innerHTML = `
        <div class="error-state">
          <span class="ico">⚠️</span>
          Failed to load news.<br><small>${err.message}</small><br><br>
          News will retry on next refresh cycle.
        </div>`;
    }
  }

  function getPhoto(keywords, seed) {
    return `https://source.unsplash.com/800x450/?${encodeURIComponent(keywords)}&sig=${seed}`;
  }

  function renderCards(articles) {
    if (!articles || !articles.length) {
      document.getElementById('feed').innerHTML = `<div class="error-state"><span class="ico">📭</span>No stories found. Will retry shortly.</div>`;
      return;
    }

    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    const sorted = [...articles].sort((a,b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));

    sorted.forEach((a, i) => {
      const card = document.createElement('div');
      card.className = 'card' + (a.featured ? ' featured' : '');
      card.style.animationDelay = (i * 0.08) + 's';

      const photoUrl = getPhoto(a.photo_keywords || 'war conflict military', i + Date.now() % 99);
      const linkHtml = (a.url && a.url !== '#')
        ? `<a class="read-link" href="${a.url}" target="_blank" rel="noopener">Read full story →</a>`
        : '';

      card.innerHTML = `
        <div class="card-img-wrap">
          <img class="card-img" src="${photoUrl}" alt="${a.title}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-img-fallback">🌍</div>
          <span class="img-source">${a.source || 'News'}</span>
          <span class="img-time">${a.time || 'Recent'}</span>
        </div>
        <div class="card-body">
          <span class="region-tag">${a.region || ''}</span>
          <div class="card-title">${a.title}</div>
          <div class="card-desc">${a.description}</div>
          ${linkHtml}
        </div>`;

      feed.appendChild(card);
    });
  }

  // Boot
  loadNews();
  startTimers();
</script>
</body>
</html>
