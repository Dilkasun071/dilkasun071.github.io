<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WarWatch — Live Updates</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #d93025;
    --dark: #111;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #777;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: #0a0a0a;
    border-bottom: 1px solid var(--border);
    padding: 0.8rem 1rem 0.65rem;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.7rem;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .logo em { color: var(--red); font-style: normal; }

  .live-pill {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(217,48,37,0.12);
    border: 1px solid rgba(217,48,37,0.35);
    border-radius: 20px;
    padding: 0.25rem 0.65rem;
    font-size: 0.64rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--red);
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.45rem;
  }

  .tab-btn {
    padding: 0.55rem 0.5rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #1a1a1a;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .tab-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  .refresh-bar {
    background: #161616;
    border-bottom: 1px solid var(--border);
    padding: 0.45rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .refresh-info { font-size: 0.7rem; color: var(--muted); }
  .refresh-info b { color: #5cb85c; }

  .progress-wrap {
    width: 100px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--red);
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
  }

  .feed {
    padding: 0.85rem 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .card {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    animation: up 0.35s ease both;
    text-decoration: none;
    display: block;
    color: inherit;
  }
  @keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

  .card-img-wrap { position: relative; }

  .card-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #222;
  }

  .card-img-fallback {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg,#1a1a1a,#252525);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  .img-source {
    position: absolute;
    bottom: 0.55rem;
    left: 0.55rem;
    background: rgba(0,0,0,0.78);
    border-radius: 5px;
    padding: 0.16rem 0.48rem;
    font-size: 0.63rem;
    font-weight: 700;
    color: #ddd;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    backdrop-filter: blur(4px);
  }

  .img-time {
    position: absolute;
    bottom: 0.55rem;
    right: 0.55rem;
    background: rgba(0,0,0,0.78);
    border-radius: 5px;
    padding: 0.16rem 0.48rem;
    font-size: 0.63rem;
    color: #bbb;
    backdrop-filter: blur(4px);
  }

  .card-body { padding: 0.9rem 1rem 1rem; }

  .region-tag {
    display: inline-block;
    background: rgba(217,48,37,0.15);
    color: #ff6b5b;
    border-radius: 5px;
    padding: 0.17rem 0.5rem;
    font-size: 0.63rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.5rem;
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 0.55rem;
  }

  .card.featured .card-title { font-size: 1.28rem; }

  .card-desc {
    font-size: 0.82rem;
    line-height: 1.68;
    color: #aaa;
  }

  .read-more {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.75rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--red);
  }

  /* SKELETON */
  .skel-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
  .skel { background: linear-gradient(90deg,#1c1c1c 25%,#272727 50%,#1c1c1c 75%); background-size:200% 100%; animation:shine 1.4s infinite; }
  .skel-img { width:100%; aspect-ratio:16/9; }
  .skel-body { padding:0.9rem 1rem 1rem; display:flex; flex-direction:column; gap:0.5rem; }
  .skel-line { height:11px; border-radius:4px; }
  @keyframes shine { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .state-msg {
    text-align:center;
    padding:3rem 1.5rem;
    color:var(--muted);
    font-size:0.85rem;
    line-height:1.8;
  }
  .state-msg .ico { font-size:2.5rem; display:block; margin-bottom:0.75rem; }

  footer {
    text-align:center;
    padding:1.5rem 1rem 3rem;
    font-size:0.66rem;
    color:#333;
    line-height:1.8;
    border-top:1px solid var(--border);
    margin-top:0.5rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">War<em>Watch</em></div>
    <div class="live-pill"><div class="live-dot"></div> Live</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-iran" onclick="switchTab('iran')">🇮🇷🇮🇱🇺🇸 Iran · Israel · US</button>
    <button class="tab-btn" id="tab-ukraine" onclick="switchTab('ukraine')">🇺🇦🇷🇺 Ukraine · Russia</button>
  </div>
</header>

<div class="refresh-bar">
  <div class="refresh-info">Refreshes in <b id="countdown">5:00</b></div>
  <div class="progress-wrap"><div class="progress-bar" id="bar"></div></div>
</div>

<div class="feed" id="feed"></div>

<footer>
  WarWatch · Real news via GNews RSS · Auto-refreshes every 5 min<br>
  Always verify at original source
</footer>

<script>
  // ── GNews RSS via allorigins CORS proxy ──
  // GNews provides real Google News RSS results — no API key needed
  const CORS = 'https://api.allorigins.win/get?url=';

  const TOPICS = {
    iran: {
      label: 'Iran · Israel · US',
      tag: 'Iran Israel US war',
      feeds: [
        'https://news.google.com/rss/search?q=Iran+Israel+US+war+military+strike&hl=en-US&gl=US&ceid=US:en',
        'https://news.google.com/rss/search?q=Iran+nuclear+Israel+attack+2026&hl=en-US&gl=US&ceid=US:en'
      ]
    },
    ukraine: {
      label: 'Ukraine · Russia',
      tag: 'Ukraine Russia',
      feeds: [
        'https://news.google.com/rss/search?q=Ukraine+Russia+war+frontline&hl=en-US&gl=US&ceid=US:en',
        'https://news.google.com/rss/search?q=Ukraine+war+drone+attack+2026&hl=en-US&gl=US&ceid=US:en'
      ]
    }
  };

  let active = 'iran';
  let timerSecs = 300, elapsed = 0;
  let cdTick = null, prTick = null;

  function switchTab(t) {
    active = t;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + t).classList.add('active');
    resetTimers();
    loadNews();
  }

  function resetTimers() {
    clearInterval(cdTick); clearInterval(prTick);
    timerSecs = 300; elapsed = 0;
    document.getElementById('bar').style.width = '0%';
    startTimers();
  }

  function startTimers() {
    cdTick = setInterval(() => {
      timerSecs--;
      const m = Math.floor(timerSecs / 60);
      const s = String(timerSecs % 60).padStart(2,'0');
      document.getElementById('countdown').textContent = m + ':' + s;
      if (timerSecs <= 0) { timerSecs = 300; elapsed = 0; loadNews(); }
    }, 1000);

    prTick = setInterval(() => {
      elapsed++;
      document.getElementById('bar').style.width = Math.min((elapsed/300)*100,100) + '%';
      if (elapsed >= 300) elapsed = 0;
    }, 1000);
  }

  function showSkeletons() {
    document.getElementById('feed').innerHTML = [0,1,2,3].map(() => `
      <div class="skel-card">
        <div class="skel skel-img"></div>
        <div class="skel-body">
          <div class="skel skel-line" style="width:36%"></div>
          <div class="skel skel-line" style="width:90%;height:16px;margin-top:2px"></div>
          <div class="skel skel-line" style="width:70%;height:16px"></div>
          <div class="skel skel-line" style="width:95%;margin-top:4px"></div>
          <div class="skel skel-line" style="width:80%"></div>
          <div class="skel skel-line" style="width:60%"></div>
        </div>
      </div>`).join('');
  }

  function parseTimeAgo(dateStr) {
    if (!dateStr) return 'Recent';
    const pub = new Date(dateStr);
    const diff = Math.floor((Date.now() - pub) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff/60) + ' min ago';
    if (diff < 86400) return Math.floor(diff/3600) + ' hr ago';
    if (diff < 172800) return 'Yesterday';
    return pub.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  }

  function stripHtml(html) {
    const d = document.createElement('div');
    d.innerHTML = html || '';
    return d.textContent || '';
  }

  function extractImage(item) {
    // Try media:content, enclosure, or og image in content
    const content = item.querySelector('encoded')?.textContent || item.querySelector('description')?.textContent || '';
    const imgMatch = content.match(/<img[^>]+src=["']([^"']+)["']/i);
    if (imgMatch) return imgMatch[1];
    const enc = item.querySelector('enclosure');
    if (enc && enc.getAttribute('type')?.startsWith('image')) return enc.getAttribute('url');
    const media = item.querySelector('content');
    if (media && media.getAttribute('url')) return media.getAttribute('url');
    return null;
  }

  function getSourceName(item) {
    const src = item.querySelector('source');
    if (src) return src.textContent;
    const link = item.querySelector('link')?.textContent || '';
    try { return new URL(link).hostname.replace('www.',''); } catch { return 'News'; }
  }

  function getPhotoFallback(topic, seed) {
    const kw = topic === 'iran' ? 'Iran+Israel+military' : 'Ukraine+Russia+war';
    return `https://source.unsplash.com/800x450/?${kw}&sig=${seed}`;
  }

  async function fetchFeed(url) {
    const proxyUrl = CORS + encodeURIComponent(url);
    const res = await fetch(proxyUrl);
    const json = await res.json();
    const parser = new DOMParser();
    const doc = parser.parseFromString(json.contents, 'text/xml');
    return Array.from(doc.querySelectorAll('item'));
  }

  async function loadNews() {
    showSkeletons();
    const topic = TOPICS[active];

    try {
      // Fetch both feeds in parallel
      const results = await Promise.allSettled(topic.feeds.map(f => fetchFeed(f)));

      let items = [];
      for (const r of results) {
        if (r.status === 'fulfilled') items = items.concat(r.value);
      }

      if (!items.length) throw new Error('No articles returned from RSS');

      // Deduplicate by title, sort newest first
      const seen = new Set();
      const unique = items.filter(item => {
        const title = item.querySelector('title')?.textContent || '';
        if (seen.has(title)) return false;
        seen.add(title);
        return true;
      });

      unique.sort((a, b) => {
        const da = new Date(a.querySelector('pubDate')?.textContent || 0);
        const db = new Date(b.querySelector('pubDate')?.textContent || 0);
        return db - da;
      });

      renderCards(unique.slice(0, 6), topic);

    } catch (err) {
      console.error(err);
      document.getElementById('feed').innerHTML = `
        <div class="state-msg">
          <span class="ico">⚠️</span>
          Could not load news feed.<br>
          <small style="color:#555">${err.message}</small><br><br>
          Will retry automatically.
        </div>`;
    }
  }

  function renderCards(items, topic) {
    if (!items.length) {
      document.getElementById('feed').innerHTML = `<div class="state-msg"><span class="ico">📭</span>No stories found right now.</div>`;
      return;
    }

    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    items.forEach((item, i) => {
      const title = stripHtml(item.querySelector('title')?.textContent || 'Untitled');
      const link  = item.querySelector('link')?.textContent || '#';
      const pubDate = item.querySelector('pubDate')?.textContent;
      const timeAgo = parseTimeAgo(pubDate);
      const source = getSourceName(item);

      // Description: clean HTML tags
      const rawDesc = item.querySelector('description')?.textContent || '';
      const desc = stripHtml(rawDesc).replace(/\[.*?\]/g,'').trim().slice(0, 320);

      // Image
      const imgSrc = extractImage(item) || getPhotoFallback(active, i + Date.now() % 99);

      // Region tag from title keywords
      let region = topic.tag;
      if (/iran/i.test(title)) region = 'Iran';
      else if (/israel/i.test(title)) region = 'Israel';
      else if (/gaza/i.test(title)) region = 'Gaza';
      else if (/ukraine/i.test(title)) region = 'Ukraine';
      else if (/russia/i.test(title)) region = 'Russia';
      else if (/moscow/i.test(title)) region = 'Moscow';
      else if (/kyiv/i.test(title)) region = 'Kyiv';

      const card = document.createElement('a');
      card.className = 'card' + (i === 0 ? ' featured' : '');
      card.href = link;
      card.target = '_blank';
      card.rel = 'noopener';
      card.style.animationDelay = (i * 0.07) + 's';

      card.innerHTML = `
        <div class="card-img-wrap">
          <img class="card-img" src="${imgSrc}" alt="${title}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-img-fallback">🌍</div>
          <span class="img-source">${source}</span>
          <span class="img-time">${timeAgo}</span>
        </div>
        <div class="card-body">
          <span class="region-tag">${region}</span>
          <div class="card-title">${title}</div>
          ${desc ? `<div class="card-desc">${desc}</div>` : ''}
          <span class="read-more">Read full story →</span>
        </div>`;

      feed.appendChild(card);
    });
  }

  // Boot
  loadNews();
  startTimers();
</script>
</body>
</html>
